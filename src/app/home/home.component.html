<div class="home-container">
  <h2>Mis Metas de Vida</h2>

  <div class="input-group">
    <input type="text" [(ngModel)]="nuevaMeta" placeholder="Escribe una nueva meta...">
    <button class="add-btn" (click)="agregar()">Agregar Meta</button>
  </div>

  <ul>
    <li *ngFor="let m of misMetas">
      <span class="meta-text">{{ m.meta }}</span>
      <button class="delete-btn" (click)="borrar(m.id)">Eliminar</button>
    </li>
  </ul>
</div>
